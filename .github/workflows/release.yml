name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # Triggered by tags like v1.2.3

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm run postinstall

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # CSC_LINK e CSC_KEY_PASSWORD sono le variabili native di electron-builder
          # CSC_LINK accetta sia un percorso file che una stringa Base64 del .pfx
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-vite build && npx electron-builder --win --publish always
